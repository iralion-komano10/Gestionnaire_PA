{% extends 'base.html' %}

{% block title %}Annuler le Plan{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-times-circle me-2"></i>
                        Confirmer l'annulation
                    </h4>
                </div>
                <div class="card-body text-center py-4">
                    <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                    <h5>Êtes-vous sûr de vouloir annuler ce plan ?</h5>
                    <p class="text-muted mb-4">
                        "{{ plan.description|truncatechars:100 }}"
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <a href="{% url 'pa:detail_plan' plan.id %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Non, retour
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-check-circle me-2"></i>Oui, annuler
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
