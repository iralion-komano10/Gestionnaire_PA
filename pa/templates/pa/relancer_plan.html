{% extends 'base.html' %}

{% block title %}Relancer le Plan{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-sync-alt me-2"></i>
                        Relancer le plan
                    </h4>
                </div>
                <div class="card-body text-center py-4">
                    <i class="fas fa-rocket fa-4x text-success mb-3"></i>
                    <h5>Relancer ce plan d'action ?</h5>
                    <p class="text-muted mb-4">
                        "{{ plan.description|truncatechars:100 }}"
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <a href="{% url 'pa:detail_plan' plan.id %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Annuler
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-play me-2"></i>Relancer
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
